{% extends "bazowy.html" %}

{% block tresc %}
<h2>{% if ksiazka %}Edytuj książkę{% else %}Dodaj książkę{% endif %}</h2>
<form method="POST">
    <label for="tytul">Tytuł</label>
    <input type="text" id="tytul" name="tytul" value="{{ ksiazka.tytul if ksiazka else '' }}" required>

    <label for="autor">Autor</label>
    <input type="text" id="autor" name="autor" value="{{ ksiazka.autor if ksiazka else '' }}" required>

    <label for="rok_wydania">Rok wydania</label>
    <input type="number" id="rok_wydania" name="rok_wydania" value="{{ ksiazka.rok_wydania if ksiazka else '' }}" required>

    <button type="submit">Zapisz</button>
</form>
{% endblock %}
